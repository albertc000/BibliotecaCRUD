<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="btn-close-sidebar" id="closeSidebar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"></path></svg>
        </div>

        <a href="#" class="brand">
            <div class="brand-logo">
                <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" d="M6 2a2 2 0 0 0-2 2v15a3 3 0 0 0 3 3h12a1 1 0 1 0 0-2h-2v-2h2a1 1 0 0 0 1-1V4a2 2 0 0 0-2-2h-8v16h5v2H7a1 1 0 1 1 0-2h1V2H6Z" clip-rule="evenodd"/>
                </svg>
            </div>
            <h2>Biblioteca</h2>
        </a>

        <ul class="nav-list">
            <li class="nav-item">
                <a href="/" class="nav-link active">
                    <svg id="icono" class="w-[34px] h-[34px] text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m4 12 8-8 8 8M6 10.5V19a1 1 0 0 0 1 1h3v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h3a1 1 0 0 0 1-1v-8.5"/>
                    </svg>
                    Inicio
                </a>
            </li>
            <li class="nav-item">
                <a href="/listado" class="nav-link">
                    <svg id="icono" class="w-[34px] h-[34px] text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M9 8h10M9 12h10M9 16h10M4.99 8H5m-.02 4h.01m0 4H5"/>
                    </svg>
                    Listado Completo
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a href="#" class="nav-link" style="margin-top: 1rem;">
                <svg id="icono" class="w-[34px] h-[34px] text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12l4-4m-4 4 4 4"/>
                </svg>
                Salir
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h1 style="font-size: 2rem; background-clip: unset; -webkit-background-clip: unset; -webkit-text-fill-color: initial; background: none;">Sistema de Gestión de una Biblioteca</h1>
                <p style="color: #64748b; margin-top: 0.5rem;">Bienvenido al Panel de Control</p>
            </div>
        </header>

        <div class="dashboard-grid">
                <div class="stat-card">
                    <h4>Total de Libros</h4>
                    <p><span id="totalLibros"></span></p>
                </div>
        </div>

        <div style="margin-top: 3rem; background: white; border: 1px solid var(--border); border-radius: 16px; padding: 2rem;" class="dashboard-grid";>
            <div class="stat-card">
                <h4 style="margin-bottom: 1.5rem; text-align: center; font-size: 1.1rem;">Libros Recientemente Añadidos</h4>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th scope="col">Código ISBN</th>
                                <th scope="col">Título</th>
                                <th scope="col">Autor</th>
                                <th scope="col">Año</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">

                        </tbody>
                    </table>
                </div>
            </div>
            <div class="stat-card">
                <h4 style="margin-bottom: 1.5rem; text-align: center; font-size: 1.1rem;">Primeros Libros añadidos</h4>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th scope="col">Código ISBN</th>
                                <th scope="col">Título</th>
                                <th scope="col">Autor</th>
                                <th scope="col">Año</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla2">

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const burger = document.getElementById('burger');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('closeSidebar');

        closeSidebar.addEventListener('click', () => {
            sidebar.classList.remove('active');
        });
        function updateRgbVariables() {
            const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
            if (primaryColor.startsWith('#')) {
                const r = parseInt(primaryColor.slice(1, 3), 16);
                const g = parseInt(primaryColor.slice(3, 5), 16);
                const b = parseInt(primaryColor.slice(5, 7), 16);
                document.documentElement.style.setProperty('--primary-rgb', `${r}, ${g}, ${b}`);
            }
        }
        updateRgbVariables();

        //
        const totalLibros = document.getElementById('totalLibros');
        async function cargarBD(){
            try{
                const respuesta = await fetch('/api/biblioteca');
                if (!respuesta.ok) {
                    throw new Error('Error al cargar el archivo JSON');
                }
                const datos = await respuesta.json();
                totalLibros.textContent = (datos.length);
            }
            catch (error){
                console.error('Hubo un problema:', error);
            }
            
        }
        cargarBD();
        
        async function renderizarListas() {
            const respuesta = await fetch('/api/biblioteca');
            const estudiantes = await respuesta.json();
            const cuerpo = document.getElementById('cuerpoTabla');

            const ultimosTresLibros = estudiantes.slice(-3).reverse();
            //filas con los 3 ultimos libros
            cuerpo.innerHTML = ultimosTresLibros.map(libro => {
                    return `
                    <tr>
                        <td>${libro.codigo}</td>
                        <td>${libro.titulo}</td>
                        <td>${libro.autor}</td>
                        <td>${libro.ano}</td>
                    </tr>
                `;
            }).join('');

            const respuesta2 = await fetch('/api/biblioteca');
            const estudiantes2 = await respuesta2.json();
            const cuerpo2 = document.getElementById('cuerpoTabla2');
            const primerosTresLibros = estudiantes2.slice(0, 3);
            //filas con los 3 ultimos libros
            cuerpo2.innerHTML = primerosTresLibros.map(libro => {
                    return `
                    <tr>
                        <td>${libro.codigo}</td>
                        <td>${libro.titulo}</td>
                        <td>${libro.autor}</td>
                        <td>${libro.ano}</td>
                    </tr>
                `;
            }).join('');
        }
        renderizarListas();


    </script>
</body>
</html>
